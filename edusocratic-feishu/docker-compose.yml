version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - config/secret.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/edusocratic
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./prompts:/app/prompts
      - ./config:/app/config
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edusocratic
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A app.tasks worker --loglevel=info
    env_file:
      - config/secret.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/edusocratic
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
